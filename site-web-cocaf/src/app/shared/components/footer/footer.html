<footer class="bg-gradient-to-r from-[#2f5f9e] to-[#3b79c9] text-white">
  <div class="max-w-screen-xl mx-auto p-6 flex items-center justify-center gap-8 flex-wrap text-center">

    <span class="text-lg">Communauté Catholique Francophone de Essen</span>

    <div class="flex items-center justify-center space-x-6">

      <!-- Facebook -->
      <a href="https://facebook.com/tonpage" target="_blank" class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-gray-800 hover:text-blue-800 transition">
        <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24">
          <path d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9
          1.1 0 2.2.2 2.2.2v2.4h-1.3c-1.3 0-1.7.8-1.7 1.6V12h2.9l-.5 2.9h-2.4v7A10 10 0 0 0 22 12"/>
        </svg>
      </a>

      <!-- Contact -->
      <div class="relative">

        <!--Contact & icon -->
        <div class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-gray-800 hover:text-green-400 cursor-pointer transition"
            (click)="toggleContacts($event)">

          <svg xmlns="http://www.w3.org/2000/svg"
               fill="none"
               viewBox="0 0 24 24"
               stroke-width="1.8"
               stroke="currentColor"
               class="w-6 h-6">

            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.25 6.75c0 8.284 6.716 15 15 15h1.5a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106a1.125 1.125 0 0 0-1.173.417l-.97 1.293a1.125 1.125 0 0 1-1.37.38 12.035 12.035 0 0 1-7.143-7.143 1.125 1.125 0 0 1 .38-1.37l1.293-.97a1.125 1.125 0 0 0 .417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25z"/>
          </svg>

        </div>

        <!-- Popup -->
        <div *ngIf="activePopup === 'contacts'"
            class="absolute bottom-8 right-0 bg-white text-black rounded-lg shadow-lg p-3 w-40"
              (click)="$event.stopPropagation()">

          <div *ngFor="let contact of contacts"
               class="flex items-center justify-between py-2 cursor-pointer hover:bg-gray-300 rounded px-2"
               (click)="call(contact, $event)">

            <div class="flex flex-col">
              <span class="font-medium">{{ contact.name }}</span>
              <span class="text-sm text-gray-600">{{ contact.phone }}</span>
            </div>
            <span>📞</span>

          </div>

        </div>

      </div>
      
      <!-- Email -->
      <div class="relative">

        <!-- Email icon -->
        <div class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-gray-800 hover:text-red-400 cursor-pointer transition"
            (click)="openEmailPopup($event)">

          <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24">
            <path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4-8 5-8-5V6l8 5 8-5z"/>
          </svg>

        </div>

        <!-- Popup -->
        <div *ngIf="activePopup === 'email'"
            class="absolute bottom-8 right-0 bg-white text-black rounded-lg shadow-lg p-3 w-56"
            (click)="$event.stopPropagation()">

          <div class="text-sm font-semibold mb-2">
            Email
          </div>

          <!-- Clickable email -->
          <div class="text-blue-600 cursor-pointer hover:underline"
              (click)="sendMail($event)">
            {{ email }}
          </div>

        </div>

      </div>

      <!-- Location -->
      <a href="https://maps.google.com/?q=Franziskanerstraße 69, 45139 Essen" target="_blank" class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-gray-800 transition">
        📍
      </a>

    </div>

  </div>
</footer>
